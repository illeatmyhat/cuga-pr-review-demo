# cuga-pr-review.yml — Approach B + concurrency group
#
# ARMING LOGIC (Approach B):
#   1. Someone posts `/cuga` on a PR → this workflow fires, adds label `cuga-enabled`,
#      then runs cuga to process the PR.
#   2. Subsequent comments on that PR auto-fire cuga because the label is present,
#      even if the comment body doesn't start with `/cuga`.
#   3. `/cuga stop` removes the label so future comments no longer auto-fire.
#
# CONCURRENCY:
#   group: cuga-pr-<PR number>, cancel-in-progress: true
#   If CodeRabbit posts 8 comments in 3 seconds, only the last workflow run survives.
#   That final run sees all the comments together and processes them in one pass.
#
# INSTALL:
#   Copy ONLY this file into your repo's .github/workflows/ — nothing else.
#   The workflow fetches the pr-review-fix skill definition from the cuga-agent
#   repo at runtime (see the "Fetch pr-review-fix skill" step below), so you
#   never need to copy the SKILL.md into your repo.
#
#   Pin or swap the skill source by editing CUGA_SKILLS_REPO / CUGA_SKILLS_REF
#   in the env block of the "Fetch pr-review-fix skill" step.

name: cuga PR review

on:
  issue_comment:
    types: [created]

# Collapse concurrent runs for the same PR — last writer wins.
# This is the key guard against CodeRabbit comment bursts.
concurrency:
  group: cuga-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    # Only run on PR comments (not issue comments) AND one of:
    #   a) the comment body starts with `/cuga` (first invocation or explicit command)
    #   b) the PR already carries the `cuga-enabled` label (subsequent auto-fire)
    if: |
      github.event.issue.pull_request != null &&
      (
        startsWith(github.event.comment.body, '/cuga') ||
        contains(github.event.issue.labels.*.name, 'cuga-enabled')
      )
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. uv ────────────────────────────────────────────────────────────────
      - name: Install uv
        run: pip install uv

      # ── 4. Install cuga ──────────────────────────────────────────────────────
      # Running inside cuga-agent repo: `uv sync` is preferred.
      # For external consumers change this to: uv pip install --system cuga
      - name: Install cuga
        run: uv pip install --system cuga

      # ── 5. Git identity ──────────────────────────────────────────────────────
      - name: Configure git identity
        run: |
          git config user.name  "cuga-bot"
          git config user.email "cuga-bot@users.noreply.github.com"

      # ── 6. Handle /cuga stop ─────────────────────────────────────────────────
      # Removes the label so subsequent comments no longer auto-fire cuga.
      - name: Handle stop command
        if: startsWith(github.event.comment.body, '/cuga stop')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.issue.number }}"
          gh pr edit "$PR" --remove-label cuga-enabled 2>/dev/null || true
          gh pr comment "$PR" --body "cuga stopped. Future comments on this PR will not trigger automatic review. Run \`/cuga\` to re-arm."
          echo "CUGA_STOP=true" >> "$GITHUB_ENV"

      # ── 7. Arm the PR (add label on first /cuga) ─────────────────────────────
      # Idempotent: label creation uses `|| true`; re-adding an existing label is a no-op.
      - name: Arm PR with cuga-enabled label
        if: |
          env.CUGA_STOP != 'true' &&
          startsWith(github.event.comment.body, '/cuga') &&
          !contains(github.event.issue.labels.*.name, 'cuga-enabled')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.issue.number }}"
          # Create the label in the repo if it doesn't exist yet
          gh label create cuga-enabled \
            --color 0E8A16 \
            --description "PR is being watched by cuga" \
            2>/dev/null || true
          gh pr edit "$PR" --add-label cuga-enabled

      # ── 8. Checkout the PR branch ────────────────────────────────────────────
      - name: Check out PR branch
        if: env.CUGA_STOP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ github.event.issue.number }}

      # ── 9. Fetch the pr-review-fix skill ─────────────────────────────────────
      # The skill is cuga's capability — it lives in the cuga-agent repo and is
      # fetched at runtime so consumer repos don't have to vendor a copy.
      # Cuga discovers it automatically because `.agents/skills/**/SKILL.md` in
      # the current working directory is a recognised skill search root.
      #
      # To pin a specific cuga version, change CUGA_SKILLS_REF to a tag or SHA.
      - name: Fetch pr-review-fix skill
        if: env.CUGA_STOP != 'true'
        env:
          # Pre-merge testing: point at the fork's feature branch.
          # After this PR merges to cuga-project/cuga-agent main, revert these to
          #   CUGA_SKILLS_REPO: cuga-project/cuga-agent
          #   CUGA_SKILLS_REF: main
          CUGA_SKILLS_REPO: gaodan-fang/cuga-agent
          CUGA_SKILLS_REF: feat/pr-review-fix-skill
        run: |
          mkdir -p .agents/skills/pr-review-fix
          curl -fsSL \
            "https://raw.githubusercontent.com/${CUGA_SKILLS_REPO}/${CUGA_SKILLS_REF}/docs/examples/pr-review-fix/SKILL.md" \
            -o .agents/skills/pr-review-fix/SKILL.md
          echo "Fetched skill from ${CUGA_SKILLS_REPO}@${CUGA_SKILLS_REF}"
          wc -l .agents/skills/pr-review-fix/SKILL.md

      # ── 10. Run cuga ─────────────────────────────────────────────────────────
      - name: Run cuga PR review
        if: env.CUGA_STOP != 'true'
        id: cuga
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          # LLM provider + model selection.
          # Configure without editing this file by setting repo VARIABLES
          # (Settings > Secrets and variables > Actions > Variables tab):
          #   CUGA_PROVIDER_CONFIG (optional) - one of:
          #     settings.openai.toml (default), settings.groq.toml,
          #     settings.openrouter.toml, settings.watsonx.toml,
          #     settings.azure.toml, settings.google.toml,
          #     settings.litellm.toml, settings.rits.toml
          #   CUGA_MODEL (optional) - fully-qualified model name, e.g.
          #     openai/gpt-4o-mini, openai/gpt-4o, groq/llama-3.3-70b-versatile
          #     If unset, cuga uses the default from the provider config file.
          #
          # Set the matching SECRET for your provider (e.g. OPENAI_API_KEY,
          # GROQ_API_KEY). All common ones are forwarded below - whichever is
          # set wins; the rest stay empty and are ignored.
          AGENT_SETTING_CONFIG: ${{ vars.CUGA_PROVIDER_CONFIG || 'settings.openai.toml' }}
          MODEL_NAME: ${{ vars.CUGA_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Watsonx (IBM): set CUGA_PROVIDER_CONFIG=settings.watsonx.toml
          # Required if using watsonx:
          #   secret WATSONX_API_KEY
          #   var    WATSONX_PROJECT_ID
          #   var    WATSONX_URL (e.g. https://us-south.ml.cloud.ibm.com)
          WATSONX_API_KEY: ${{ secrets.WATSONX_API_KEY }}
          WATSONX_PROJECT_ID: ${{ vars.WATSONX_PROJECT_ID }}
          WATSONX_URL: ${{ vars.WATSONX_URL }}
        run: |
          python - <<'EOF'
          import asyncio, os, pathlib, subprocess
          from cuga import CugaAgent
          from langchain_core.tools import tool

          # Custom tools — cuga's SDK entry point does not ship built-in shell/file
          # tools (those require OpenSandbox, which we intentionally don't run here).
          # We define lightweight LangChain tools that run directly in the GH Actions
          # runner, where `gh` and `git` are pre-installed and GITHUB_TOKEN is set.

          @tool
          def run_command(command: str) -> str:
              """Run a shell command in the current working directory.

              Use this for `gh` CLI calls, `git` operations, and any other shell work.
              Returns the combined stdout + stderr with the exit code.
              Timeout is 5 minutes per call.
              """
              try:
                  result = subprocess.run(
                      command, shell=True, capture_output=True, text=True, timeout=300
                  )
              except subprocess.TimeoutExpired:
                  return "[exit timeout] command exceeded 300s"
              out = result.stdout or ""
              if result.stderr:
                  out += "\n[stderr]\n" + result.stderr
              return f"[exit {result.returncode}]\n{out}"

          @tool
          def read_file(path: str) -> str:
              """Read a text file from the repository workspace and return its contents."""
              return pathlib.Path(path).read_text()

          @tool
          def write_file(path: str, content: str) -> str:
              """Overwrite a text file with the given content. Creates parent dirs if needed."""
              p = pathlib.Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content)
              return f"wrote {len(content)} bytes to {path}"

          @tool
          def list_files(directory: str = ".") -> str:
              """List the entries in a directory (non-recursive), one per line."""
              return "\n".join(sorted(os.listdir(directory)))

          async def main():
              # Inline the fetched skill body as the prompt preamble, so we don't depend
              # on cuga's skill-discovery (which requires OpenSandbox to be reachable).
              skill_md = pathlib.Path(".agents/skills/pr-review-fix/SKILL.md").read_text()

              pr   = os.environ["PR_NUMBER"]
              repo = os.environ["GITHUB_REPOSITORY"]
              msg  = (
                  f"You are handling PR #{pr} on {repo}. Use the tools run_command, "
                  f"read_file, write_file, and list_files to do the work. Follow these "
                  f"instructions exactly:\n\n---\n{skill_md}\n---\n\n"
                  f"IMPORTANT: commit fixes locally but do NOT push. The workflow "
                  f"will rebase on the latest PR branch and push your commits after "
                  f"this step."
              )

              agent = CugaAgent(tools=[run_command, read_file, write_file, list_files])
              result = await agent.invoke(msg)
              print(result.answer)

          asyncio.run(main())
          EOF

      # ── 11. Push cuga's commits back to the PR branch ────────────────────────
      # `gh pr checkout` (step 8) put us on the PR branch with upstream tracking
      # configured. Cuga committed locally during step 10 but did not push.
      # We fetch + rebase against the upstream tip first to absorb anything a
      # reviewer or bot pushed during the run, then push the result. The push
      # is a no-op if cuga produced no new commits.
      - name: Push cuga commits to PR branch
        if: env.CUGA_STOP != 'true'
        run: |
          set -euo pipefail

          # Cuga should commit as it goes — a dirty tree here is a bug, not
          # something to silently auto-stage. Warn and skip the push.
          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "::warning::Working tree not clean after cuga run; skipping push."
            git status --short
            exit 0
          fi

          UPSTREAM="$(git rev-parse --abbrev-ref --symbolic-full-name '@{u}' 2>/dev/null || true)"
          if [ -z "$UPSTREAM" ]; then
            echo "No upstream tracking branch; nothing to push."
            exit 0
          fi

          # Re-sync with the PR branch in case CodeRabbit, a reviewer, or a
          # since-cancelled concurrent run pushed while cuga ran.
          git fetch origin
          if ! git pull --rebase --autostash; then
            echo "::error::Rebase against $UPSTREAM failed; aborting push."
            git rebase --abort || true
            exit 1
          fi

          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse "$UPSTREAM")
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "No new commits to push."
            exit 0
          fi

          echo "Pushing $(git rev-list --count "$REMOTE..$LOCAL") commit(s) to $UPSTREAM"
          git push

      # ── 12. Post summary comment ─────────────────────────────────────────────
      - name: Post summary comment on PR
        if: env.CUGA_STOP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.issue.number }}"
          gh pr comment "$PR" --body "**cuga** finished processing this comment. See the commits above for applied fixes. Run \`/cuga stop\` to disarm automatic review on this PR."
